name: Cofre Digital - Deploy Automatizado

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  REGISTRY: docker.io
  IMAGE_NAME: cofre-digital-app

jobs:
  build:
    name: Construir Container Image
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extrair metadados
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-

      - name: Build e Push da imagem
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  deploy-production:
    name: Deploy Produção
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Deploy para Produção
        run: |
          echo "Iniciando deploy para PRODUÇÃO..."
          echo "DB_HOST=${{ secrets.PROD_DB_HOST }}" >> production.env
          echo "DB_PASSWORD=***MASKED***" >> production.env
          cat production.env

  security-check:
    name: Verificação de Segurança
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Verificar vazamentos de secrets
        run: |
          # Procura apenas por atribuições diretas de strings suspeitas entre aspas 
          if grep -rE "password\s*=\s*['\"][a-zA-Z0-9_.-]+['\"]" app/ --exclude-dir=.git; then 
            echo "ATENÇÃO: Possível senha hardcoded encontrada!" 
            exit 1          
          fi
          echo "Nenhum secret exposto no código fonte!"
